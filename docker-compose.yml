services:
  99freelas-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: 99freelas-mcp-server:latest
    container_name: 99freelas-mcp-server
    init: true
    command: ["node", "dist/http.js"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      STATE_DB_FILE: .data/state.sqlite
      STATE_DB_JOURNAL_MODE: DELETE
      SESSION_FILE: .data/sessions.json
      CACHE_FILE: .data/cache.json
      AUDIT_LOG_FILE: .data/audit.log
      MANUAL_COOKIES_FILE: .data/manual-cookies.json
      LOG_LEVEL: debug
      LOG_FILE: .data/server.log
      LOG_STDERR: "false"
    volumes:
      - ./.data:/app/.data
    restart: unless-stopped
