name: deploy-vps

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  VPS_HOST: 72.60.61.187
  VPS_USER: runner
  VPS_TARGET_DIR: /srv/99freelas-mcp-server/source

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -H "$VPS_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Prepare remote directory
        shell: bash
        run: |
          set -euo pipefail
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p '${VPS_TARGET_DIR}'"

      - name: Sync repository to VPS
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.data' \
            ./ \
            "${VPS_USER}@${VPS_HOST}:${VPS_TARGET_DIR}/"

      - name: Deploy on VPS
        shell: bash
        run: |
          set -euo pipefail
          ssh "${VPS_USER}@${VPS_HOST}" "cd '${VPS_TARGET_DIR}' && chmod +x scripts/deploy-vps.sh && GITHUB_SHA='${GITHUB_SHA}' ./scripts/deploy-vps.sh"
